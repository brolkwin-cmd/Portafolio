    <main>
<section id="contacto" class="contacto">
    <h2 class="TextoXp">¡Hablemos!</h2>
    <p class="Subtitulo">¿Tienes un proyecto en mente?</p>

    <div class="ContenedorContacto">
        <form action="#" method="POST" class="FormularioContacto">
            <div class="GrupoForm">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
            </div>

            <div class="GrupoForm">                <label for="email">Email</label>

                <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
            </div>

            <div class="GrupoForm">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje..." required></textarea>
            </div>

            <button type="submit" class="Boton">Enviar Mensaje</button>
        </form>
    </div>
</section>
